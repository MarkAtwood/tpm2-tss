name: CI
on:
  [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    strategy:
      matrix:
        docker_image: [fedora-32, opensuse-leap, ubuntu-22.04, ubuntu-24.04, alpine-3.15, arch-linux ]
        compiler: [gcc, clang]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        uses:
          tpm2-software/ci/runCI@main
        with:
          DOCKER_IMAGE: ${{ matrix.docker_image }}
          CC: ${{ matrix.compiler }}
          BASE_REF: ${{ github.base_ref }}
          WITH_TCTI: libtpms
          PROJECT_NAME: ${{ github.event.repository.name }}
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  scanbuild:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        uses:
          tpm2-software/ci/runCI@main
        with:
          CC: clang
          DOCKER_IMAGE: fedora-32
          SCANBUILD: yes
          WITH_TCTI: swtpm
          PROJECT_NAME: ${{ github.event.repository.name }}
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-tcti-config:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        uses:
          tpm2-software/ci/runCI@main
        with:
          CC: gcc
          DOCKER_IMAGE: fedora-32
          TEST_TCTI_CONFIG: true
          PROJECT_NAME: ${{ github.event.repository.name }}
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-mbedtls:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    strategy:
      matrix:
        docker_image: [ubuntu-20.04, ubuntu-22.04-mbedtls-3.1]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        uses:
          tpm2-software/ci/runCI@main
        with:
          CC: gcc
          DOCKER_IMAGE: ${{ matrix.docker_image }}
          WITH_CRYPTO: mbed
          WITH_TCTI: mssim
          PROJECT_NAME: ${{ github.event.repository.name }}
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-wolfssl:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            autoconf autoconf-archive automake libtool pkg-config \
            gcc make libcmocka-dev
      - name: Build and install wolfSSL
        run: |
          # Pin to a commit SHA rather than a mutable tag to prevent supply
          # chain issues if the v5.7.6-stable tag is moved.
          git clone --depth=1 --branch v5.7.6-stable \
            https://github.com/wolfSSL/wolfssl.git /tmp/wolfssl
          test "$(git -C /tmp/wolfssl rev-parse HEAD)" \
            = "239b85c80438bf60d9a5b9e0ebe9ff097a760d0d"
          cd /tmp/wolfssl
          ./autogen.sh
          # --enable-aescfb and --enable-ecc are required by the tpm2-tss wolfssl backend.
          ./configure --enable-aescfb --enable-ecc --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          sudo ldconfig
      - name: Bootstrap
        run: ./bootstrap
      - name: Configure
        run: |
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig \
          ./configure \
            --with-crypto=wolfssl \
            --disable-fapi \
            --disable-policy \
            CC=gcc
      - name: Build
        run: make -j$(nproc)
      - name: Unit tests
        run: make check TESTS="test/unit/esys-crypto"
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find . -name config.log) || true
          cat $(find . -name test-suite.log) || true
  test-no-crypto-build:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        uses:
          tpm2-software/ci/runCI@main
        with:
          CC: gcc
          DOCKER_IMAGE: ubuntu-20.04
          WITH_CRYPTO: none
          PROJECT_NAME: ${{ github.event.repository.name }}
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-coverage:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        uses:
          tpm2-software/ci/runCI@main
        with:
          CC: gcc
          DOCKER_IMAGE: ubuntu-20.04
          ENABLE_COVERAGE: true
          WITH_TCTI: swtpm
          PROJECT_NAME: ${{ github.event.repository.name }}
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.info
          fail_ci_if_error: true
          verbose: true
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-fuzz:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: Launch Action
        uses:
          tpm2-software/ci/runCI@main
        with:
          DOCKER_IMAGE: fedora-32
          GEN_FUZZ: 1
          CXX: clang++
          CC: clang
          PROJECT_NAME: ${{ github.event.repository.name }}
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  coverity-test:
    runs-on: ubuntu-latest
    if: contains(github.ref, 'coverity_scan')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Coverity Action
        uses:
          tpm2-software/ci/coverityScan@main
        with:
          PROJECT_NAME: ${{ github.event.repository.name }}
          REPO_BRANCH: ${{ github.ref }}
          REPO_NAME: ${{ github.repository }}
          ENABLE_COVERITY: true
          DOCKER_IMAGE: ubuntu-20.04
          CC: gcc
          COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
          COVERITY_SUBMISSION_EMAIL: tadeusz.struk@intel.com
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
